<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panini 2026 Dashboard</title>
    
    <!-- PWA & iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Panini 2026">
    <link rel="apple-touch-icon" href="/static/images/icon/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f172a">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header class="glass-panel">
            <div class="header-top">
                <h1>Panini World Cup 2026</h1>
                <div class="user-selector">
                    <label for="user-select">Usuario:</label>
                    <select id="user-select" onchange="changeUserDebounced()"></select>
                    <button class="btn-icon" onclick="createNewUser()" title="Añadir usuario">+</button>
                </div>
            </div>
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-value" id="val-conseguidos">0</span>
                    <span class="stat-label">Conseguidos</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="val-faltantes">0</span>
                    <span class="stat-label">Faltantes</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="val-repetidos">0</span>
                    <span class="stat-label">Repetidos</span>
                </div>
                <div class="progress-circle" id="progress-circle">
                    <span class="progress-text" id="val-porcentaje">0%</span>
                </div>
            </div>
            <div class="search-wrapper">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="global-search" placeholder="Buscar equipo o jugador..." autocomplete="off">
                    <span class="search-count" id="search-count"></span>
                    <button id="search-clear" class="search-clear hidden" title="Limpiar búsqueda">×</button>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <section class="add-cromo glass-panel">
                <h2>Añadir Cromos</h2>
                <form id="add-form">
                    <input type="text" id="cromo-input" placeholder="Ej: ARG 1, ESP 5, FWC 10" required autocomplete="off">
                    <button type="submit" class="btn-primary">Registrar</button>
                </form>
            </section>
            
            <section class="history-panel glass-panel">
                <h2>Historial Reciente</h2>
                <ul id="history-list" class="history-list">
                    <!-- History generated by JS -->
                </ul>
            </section>
        </div>

        <section id="teams-compact-section" class="glass-panel teams-compact-section">
            <h2>Mis Equipos</h2>
            <div id="teams-compact-grid" class="teams-compact-grid">
                <!-- Las tarjetas se generarán con JavaScript -->
            </div>
        </section>

        <div id="toast" class="toast">¡Cromos guardados!</div>

        <div class="action-buttons">
            <button class="btn-secondary" onclick="copyFaltantes()">📋 Copiar Faltantes (WhatsApp)</button>
            <button class="btn-secondary" onclick="copyRepetidos()">📋 Copiar Repetidos (WhatsApp)</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('faltantes')">Faltantes</button>
            <button class="tab-btn" onclick="switchTab('repetidos')">Repetidos</button>
        </div>

        <section id="tab-faltantes" class="grid-container hidden">
            <!-- Cards generated by JS -->
        </section>

        <section id="tab-repetidos" class="grid-container hidden">
            <!-- Cards generated by JS -->
        </section>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <!-- Flechas de navegación laterales -->
        <button id="modal-prev" class="modal-nav-arrow modal-nav-prev nav-hidden" onclick="navigateModal('left')" aria-label="Equipo anterior">&#8592;</button>
        <button id="modal-next" class="modal-nav-arrow modal-nav-next nav-hidden" onclick="navigateModal('right')" aria-label="Equipo siguiente">&#8594;</button>

        <div class="modal-content glass-panel">
            <button class="close-btn" onclick="closeModal()">×</button>
            <h2 id="modal-title">Equipo</h2>
            
            <div class="mode-toggle-container">
                <span class="mode-label" id="label-add">Añadir</span>
                <label class="switch">
                    <input type="checkbox" id="mode-toggle">
                    <span class="slider round"></span>
                </label>
                <span class="mode-label" id="label-remove">Borrar</span>
            </div>

            <div id="modal-grid" class="modal-grid">
                <!-- Numbers generated by JS -->
            </div>

            <!-- Contador de posición: Equipo X de Y -->
            <div class="modal-counter" id="modal-counter"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('dashboard')">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Stats</span>
        </button>
        <button class="nav-item" onclick="switchTab('faltantes')">
            <span class="nav-icon">📖</span>
            <span class="nav-label">Álbum</span>
        </button>
        <button class="nav-item" onclick="switchTab('repetidos')">
            <span class="nav-icon">🔄</span>
            <span class="nav-label">Repes</span>
        </button>
    </nav>

    <script src="/static/js/main.js"></script>
</body>
</html>
